<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Rick and Morty Character Search</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <header>
        <h1>Rick and Morty Character Search</h1>

        <p>
            Search for Rick and Morty characters by entering a name
            and selecting an optional species.
        </p>
    </header>

    <main>

        <section class="search-section">
            <h2>Search Characters</h2>

            <form id="searchForm">

                <div class="form-group">
                    <label for="characterName">
                        Character Name
                    </label>

                    <input
                        type="text"
                        id="characterName"
                        placeholder="Example: Rick"
                    >
                </div>

                <div class="form-group">
                    <label for="species">
                        Species
                    </label>

                    <select id="species">
                        <option value="">All Species</option>
                        <option value="Human">Human</option>
                        <option value="Alien">Alien</option>
                        <option value="Humanoid">Humanoid</option>
                        <option value="Robot">Robot</option>
                        <option value="Animal">Animal</option>
                    </select>
                </div>

                <button type="submit" class="search-button">
                    Search Characters
                </button>

            </form>

            <p id="errorMessage"></p>
            <p id="resultMessage"></p>
        </section>

        <section class="character-guide">
            <h2>Character Guide</h2>

            <p>
                Not sure who to search for? Click one of these
                popular characters.
            </p>

            <div class="guide-buttons">

                <button
                    type="button"
                    class="guide-button"
                    data-name="Rick Sanchez"
                >
                    Rick Sanchez
                </button>

                <button
                    type="button"
                    class="guide-button"
                    data-name="Morty Smith"
                >
                    Morty Smith
                </button>

                <button
                    type="button"
                    class="guide-button"
                    data-name="Summer Smith"
                >
                    Summer Smith
                </button>

                <button
                    type="button"
                    class="guide-button"
                    data-name="Beth Smith"
                >
                    Beth Smith
                </button>

                <button
                    type="button"
                    class="guide-button"
                    data-name="Jerry Smith"
                >
                    Jerry Smith
                </button>

                <button
                    type="button"
                    class="guide-button"
                    data-name="Birdperson"
                >
                    Birdperson
                </button>

                <button
                    type="button"
                    class="guide-button"
                    data-name="Mr. Meeseeks"
                >
                    Mr. Meeseeks
                </button>

                <button
                    type="button"
                    class="guide-button"
                    data-name="Squanchy"
                >
                    Squanchy
                </button>

            </div>
        </section>

        <section
            id="characterResults"
            class="character-grid"
        ></section>

    </main>

    <footer>
        <p>
            Character information provided by the Rick and Morty API.
        </p>
    </footer>

    <script src="js/script.js"></script>

</body>
</html>
