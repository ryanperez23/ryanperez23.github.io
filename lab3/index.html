<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Sign Up Page</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="page-wrapper">
        <h1>Sign Up Form</h1>

        <form id="signupForm" action="welcome.html">

            <!-- Line 1: First Name and Last Name together -->
            <div class="row two-columns">
                <div class="field-group">
                    <label for="fName">First Name:</label>
                    <input type="text" id="fName" name="fName">
                </div>

                <div class="field-group">
                    <label for="lName">Last Name:</label>
                    <input type="text" id="lName" name="lName">
                </div>
            </div>

            <!-- Line 2: Gender -->
            <div class="row">
                <label class="row-label">Gender:</label>

                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="gender" value="m"> Male
                    </label>

                    <label class="radio-label">
                        <input type="radio" name="gender" value="f"> Female
                    </label>
                </div>
            </div>

            <!-- Line 3: Zip Code -->
            <div class="row">
                <div class="field-group zip-row">
                    <label for="zip">Zip Code:</label>
                    <input type="text" id="zip" name="zip">
                    <span id="zipError"></span>
                </div>
            </div>

            <!-- Grey box for city, latitude, longitude -->
            <div class="locationInfo">
                <p>City: <span id="city"></span></p>
                <p>Latitude: <span id="latitude"></span></p>
                <p>Longitude: <span id="longitude"></span></p>
            </div>

            <!-- State and County -->
            <div class="row two-columns state-county-row">
                <div class="field-group">
                    <label for="state">State:</label>
                    <select id="state" name="state">
                        <option value="">Loading states...</option>
                    </select>
                </div>

                <div class="field-group">
                    <label for="county">Select a County:</label>
                    <select id="county" name="county">
                        <option value="">Select a state first</option>
                    </select>
                </div>
            </div>

            <!-- Username -->
            <div class="row align-inputs">
                <label for="username" class="fixed-label">Username:</label>
                <input type="text" id="username" name="username">
                <span id="usernameError"></span>
            </div>

            <!-- Password -->
            <div class="row align-inputs">
                <label for="password" class="fixed-label">Password:</label>
                <input type="password" id="password" name="password">
                <span id="suggestedPassword"></span>
            </div>

            <!-- Re-type Password -->
            <div class="row align-inputs">
                <label for="passwordAgain" class="fixed-label">Re-type Password:</label>
                <input
                    type="password"
                    id="passwordAgain"
                    name="passwordAgain"
                >
                <span id="passwordError"></span>
            </div>

            <!-- Center button -->
            <div class="button-row">
                <button>Sign up!</button>
            </div>

        </form>
    </div>

    <script src="js/script.js"></script>

</body>
</html>
